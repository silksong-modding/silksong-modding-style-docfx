name: autofix.ci

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          check-latest: true
      - run: npm ci
      - run: npm run format
      - uses: autofix-ci/action@v1
