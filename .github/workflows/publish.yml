on:
  push:
    branches: ["main"]
  pull_request_target:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          check-latest: true
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: build
          path: build
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    needs:
      - build
    steps:
      - name: Get App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
      - name: Get GitHub App User ID
        id: get-user-id
        run: >-
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >>
          "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Configure Bot User
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build
      - name: Publish to dist branch
        run: |
          cd build
          git init
          git remote add origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git
          git add .
          git commit -m "$(date "+%Y-%m-%d %H:%M:%S")"
          git push --force origin HEAD:refs/heads/dist
      - name: Notify consumers
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          repos=$(gh api installation/repositories \
            --paginate \
            --jq '.repositories[].full_name')

          for repo in $repos; do
            echo "Updating $repo"
            gh api --method POST repos/$repo/dispatches \
              -f event_type="template-updated"
          done
